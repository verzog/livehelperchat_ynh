rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

    alias __INSTALL_DIR__/;

    index index.php;

    # Increase upload limit for file sharing features
    client_max_body_size 50M;

    try_files $uri $uri/ index.php;

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # CORS headers required for the LHC chat widget to load on external sites
    location ~* \.(gif|jpe?g?|png|bmp|swf|css|js|svg|otf|eot|ttf|woff|woff2|mp3|ogg|map|wav|pdf|ico|txt)$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, API-Key, Authorization";
        expires 1M;
        access_log off;
    }

    # Correct MIME type for WebAssembly files used by LHC voice/video features
    location ~* \.wasm$ {
        add_header Access-Control-Allow-Origin "*";
        default_type application/wasm;
        expires 1M;
        access_log off;
    }
}
