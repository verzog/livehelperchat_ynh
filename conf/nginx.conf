# Handle missing trailing slash by redirecting to __PATH__/
# Use negative lookbehind to avoid /$ -> // for root installs
rewrite ^__PATH__(?<!/)$ __PATH__/ permanent;

# LHC_SUBPATH_SSO_CATCH_START
# LHC's PHP framework (eZ Components) emits Location: /index.php/... without
# knowing about the sub-path install. Catch those root-level redirects and
# rewrite them back into __PATH__/ so they don't fall through to SSO.
# These blocks are stripped by apply_template() for root-path installs
# (where they would self-redirect into an infinite loop).
location = /index.php {
    return 301 __PATH__/index.php$is_args$args;
}
location ~ ^/index\.php/(.*)$ {
    return 301 __PATH__/index.php/$1$is_args$args;
}
# LHC_SUBPATH_SSO_CATCH_END

location __PATH__/ {
    alias __INSTALL_DIR__/;
    index index.php;

    # Increase upload limit for file sharing features
    client_max_body_size 50M;

    # Standard YunoHost try_files logic
    # Added $uri/ to help NGINX find directories correctly
    try_files $uri $uri/ __PATH__/index.php?$args;

    # PHP-FPM configuration
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # CORS headers for the LHC chat widget to load on external sites
    location ~* \.(gif|jpe?g?|png|bmp|swf|css|js|svg|otf|eot|ttf|woff|woff2|mp3|ogg|map|wav|pdf|ico|txt)$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, API-Key, Authorization";
        expires 1M;
        access_log off;
    }

    # Correct MIME type for WebAssembly files
    location ~* \.wasm$ {
        add_header Access-Control-Allow-Origin "*";
        default_type application/wasm;
        expires 1M;
        access_log off;
    }

    # Include and handle the YunoHost panel and SSO integration
    include conf.d/yunohost_panel.conf.inc;
}
